openapi: 3.1.0
info:
  title: context_api ChatGPT Actions (read-only)
  version: 0.0.0
  description: |
    Read-only endpoints for retrieving Context Packs and intel article details.
servers:
  - url: https://YOUR_PUBLIC_BASE_URL
    description: Public base URL for context_api (replace before use)
components:
  securitySchemes:
    bearerAuth:
      type: apiKey
      in: header
      name: Authorization
      description: "Bearer <CONTEXT_API_TOKEN>"
  schemas:
    ContextPackRequest:
      type: object
      properties:
        query:
          type: string
        topics:
          type: array
          items:
            type: string
        token_budget:
          type: integer
        recency_days:
          type: integer
        max_items:
          type: integer
      required: [query]
    CitePointer:
      type: object
      properties:
        article_id:
          type: string
        section_id:
          type: string
      required: [article_id]
    Signal:
      type: object
      properties:
        claim:
          type: string
        why:
          type: string
        tradeoff:
          type: string
        cite:
          $ref: "#/components/schemas/CitePointer"
      required: [claim, why, cite]
    Citation:
      type: object
      properties:
        url:
          type: string
        article_id:
          type: string
        section_id:
          type: string
      required: [url, article_id]
    ContextPackItem:
      type: object
      properties:
        article_id:
          type: string
        title:
          type: string
        url:
          type: string
        summary:
          type: string
        signals:
          type: array
          items:
            $ref: "#/components/schemas/Signal"
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
      required: [article_id, title, url, summary, signals, citations]
    ContextPackResponse:
      type: object
      properties:
        pack:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ContextPackItem"
        retrieval_confidence:
          type: string
          enum: [high, med, low]
        next_action:
          type: string
          enum: [proceed, refine_query, expand_sections]
        trace:
          type: object
          properties:
            trace_id:
              type: string
            retrieved_article_ids:
              type: array
              items:
                type: string
            timing_ms:
              type: object
          required: [trace_id, retrieved_article_ids]
      required: [pack, retrieval_confidence, next_action, trace]
    OutlineResponse:
      type: object
      properties:
        article_id:
          type: string
        outline:
          type: array
          items:
            type: object
            properties:
              section_id:
                type: string
              heading:
                type: string
              blurb:
                type: string
            required: [section_id, heading]
      required: [article_id, outline]
    SectionsRequest:
      type: object
      properties:
        section_ids:
          type: array
          items:
            type: string
      required: [section_ids]
    SectionsResponse:
      type: object
      properties:
        article_id:
          type: string
        sections:
          type: array
          items:
            type: object
            properties:
              section_id:
                type: string
              heading:
                type: string
              content:
                type: string
              rank:
                type: integer
            required: [section_id, heading, content, rank]
      required: [article_id, sections]
    ChunkSearchRequest:
      type: object
      properties:
        query:
          type: string
        max_chars:
          type: integer
        max_chunks:
          type: integer
      required: [query]
    ChunkSearchResponse:
      type: object
      properties:
        article_id:
          type: string
        chunks:
          type: array
          items:
            type: object
            properties:
              section_id:
                type: string
              snippet:
                type: string
              score:
                type: number
            required: [section_id, snippet]
      required: [article_id, chunks]
    IntelArticleStatusResponse:
      type: object
      properties:
        article_id:
          type: string
        url:
          type: string
        title:
          type: string
        status:
          type: string
          enum: [queued, extracted, enriched, failed, partial]
        topics:
          type: array
          items:
            type: string
        summary:
          type: string
        signals:
          type: array
          items:
            type: object
        outline:
          type: array
          items:
            type: object
        meta:
          type: object
        last_error:
          type: string
      required: [article_id, url, status, topics]
    ResearchContextPackRequest:
      type: object
      properties:
        query:
          type: string
        topic_key:
          type: string
        source_ids:
          type: array
          items:
            type: string
        token_budget:
          type: integer
        recency_days:
          type: integer
        max_items:
          type: integer
        min_relevance_score:
          type: number
      required: [query, topic_key]
    ResearchCitation:
      type: object
      properties:
        document_id:
          type: string
        chunk_id:
          type: string
      required: [document_id, chunk_id]
    ResearchScoreBreakdown:
      type: object
      properties:
        total:
          type: number
        lexical:
          type: number
        embedding:
          type: number
        recency:
          type: number
        source_weight:
          type: number
      required: [total, lexical, embedding, recency, source_weight]
    ResearchSignal:
      type: object
      properties:
        claim:
          type: string
        why:
          type: string
        cite:
          $ref: "#/components/schemas/ResearchCitation"
      required: [claim, why, cite]
    ResearchContextPackItem:
      type: object
      properties:
        document_id:
          type: string
        source_id:
          type: string
        title:
          type: string
        canonical_url:
          type: string
        published_at:
          type: string
        summary:
          type: string
        signals:
          type: array
          items:
            $ref: "#/components/schemas/ResearchSignal"
        citations:
          type: array
          items:
            $ref: "#/components/schemas/ResearchCitation"
        score_breakdown:
          $ref: "#/components/schemas/ResearchScoreBreakdown"
      required: [document_id, source_id, title, canonical_url, summary, signals, citations, score_breakdown]
    ResearchContextPackResponse:
      type: object
      properties:
        pack:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/ResearchContextPackItem"
        retrieval_confidence:
          type: string
          enum: [high, med, low]
        next_action:
          type: string
          enum: [proceed, refine_query, expand_sections]
        trace:
          type: object
          properties:
            trace_id:
              type: string
            retrieved_document_ids:
              type: array
              items:
                type: string
            timing_ms:
              type: object
          required: [trace_id, retrieved_document_ids]
      required: [pack, retrieval_confidence, next_action, trace]
    ResearchChunkSearchRequest:
      type: object
      properties:
        query:
          type: string
        max_chars:
          type: integer
        max_chunks:
          type: integer
      required: [query]
    ResearchChunkSearchResponse:
      type: object
      properties:
        document_id:
          type: string
        chunks:
          type: array
          items:
            type: object
            properties:
              chunk_id:
                type: string
              snippet:
                type: string
              score:
                type: number
            required: [chunk_id, snippet]
      required: [document_id, chunks]
    ResearchOpsSummaryResponse:
      type: object
      properties:
        topic_key:
          type: string
        sources_total:
          type: integer
        sources_enabled:
          type: integer
        sources_in_cooldown:
          type: integer
        documents_total:
          type: integer
        documents_embedded:
          type: integer
        documents_failed:
          type: integer
        runs_open:
          type: integer
        runs_failed_24h:
          type: integer
        run_failure_rate_24h:
          type: number
        retrieval_queries_24h:
          type: integer
        retrieval_errors_24h:
          type: integer
      required:
        - topic_key
        - sources_total
        - sources_enabled
        - sources_in_cooldown
        - documents_total
        - documents_embedded
        - documents_failed
        - runs_open
        - runs_failed_24h
        - run_failure_rate_24h
        - retrieval_queries_24h
        - retrieval_errors_24h
    ResearchSourceMetricItem:
      type: object
      properties:
        source_id:
          type: string
        name:
          type: string
        enabled:
          type: boolean
        last_polled_at:
          type: string
        consecutive_failures:
          type: integer
        cooldown_until:
          type: string
        last_error:
          type: string
        documents_total:
          type: integer
        documents_embedded:
          type: integer
        documents_failed:
          type: integer
        retrieval_queries_24h:
          type: integer
      required:
        - source_id
        - name
        - enabled
        - consecutive_failures
        - documents_total
        - documents_embedded
        - documents_failed
        - retrieval_queries_24h
    ResearchSourceMetricsResponse:
      type: object
      properties:
        topic_key:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/ResearchSourceMetricItem"
      required: [topic_key, items]
    SourceSuggestion:
      type: object
      properties:
        kind:
          type: string
          enum: [rss, atom, site_map, html_listing, api]
        name:
          type: string
        base_url:
          type: string
        tags:
          type: array
          items:
            type: string
        poll_interval_minutes:
          type: integer
        rate_limit_per_hour:
          type: integer
        source_weight:
          type: number
        robots_mode:
          type: string
          enum: [strict, ignore]
      required: [kind, name, base_url]
    ResearchBootstrapRequest:
      type: object
      properties:
        topic_key:
          type: string
        suggestions:
          type: array
          items:
            $ref: "#/components/schemas/SourceSuggestion"
        trigger_ingest:
          type: boolean
        trigger:
          type: string
          enum: [manual, event]
        idempotency_key:
          type: string
        dry_run:
          type: boolean
      required: [topic_key, suggestions]
    ResearchBootstrapSummary:
      type: object
      properties:
        received:
          type: integer
        valid:
          type: integer
        invalid:
          type: integer
        created:
          type: integer
        updated:
          type: integer
        skipped_duplicate:
          type: integer
      required: [received, valid, invalid, created, updated, skipped_duplicate]
    ResearchBootstrapResult:
      type: object
      properties:
        index:
          type: integer
        status:
          type: string
          enum: [created, updated, invalid, skipped_duplicate]
        reason:
          type: string
        source_id:
          type: string
      required: [index, status]
    ResearchBootstrapIngest:
      type: object
      properties:
        triggered:
          type: boolean
        run_id:
          type: string
        status:
          type: string
          enum: [queued, running, completed, failed]
      required: [triggered]
    ResearchBootstrapResponse:
      type: object
      properties:
        topic_key:
          type: string
        summary:
          $ref: "#/components/schemas/ResearchBootstrapSummary"
        results:
          type: array
          items:
            $ref: "#/components/schemas/ResearchBootstrapResult"
        ingest:
          $ref: "#/components/schemas/ResearchBootstrapIngest"
      required: [topic_key, summary, results, ingest]
    ResearchBootstrapStatusEvent:
      type: object
      properties:
        event_id:
          type: string
        request_hash:
          type: string
        idempotency_key:
          type: string
        summary:
          $ref: "#/components/schemas/ResearchBootstrapSummary"
        run_id:
          type: string
        run_status:
          type: string
          enum: [queued, running, completed, failed]
        created_at:
          type: string
      required: [event_id, request_hash, summary]
    ResearchBootstrapStatusResponse:
      type: object
      properties:
        topic_key:
          type: string
        latest_bootstrap:
          $ref: "#/components/schemas/ResearchBootstrapStatusEvent"
      required: [topic_key]
paths:
  /v2/context/pack:
    post:
      summary: Retrieve a context pack from intel articles
      operationId: contextPack
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContextPackRequest"
      responses:
        "200":
          description: Context pack response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextPackResponse"
  /v2/intel/articles/{article_id}:
    get:
      summary: Get intel article status and compact outputs
      operationId: getIntelArticleStatus
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: article_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Intel article status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntelArticleStatusResponse"
  /v2/intel/articles/{article_id}/outline:
    get:
      summary: Get article outline
      operationId: getIntelOutline
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: article_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Outline response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutlineResponse"
  /v2/intel/articles/{article_id}/sections:
    post:
      summary: Get article sections by id
      operationId: getIntelSections
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: article_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SectionsRequest"
      responses:
        "200":
          description: Sections response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SectionsResponse"
  /v2/intel/articles/{article_id}/chunks:search:
    post:
      summary: Search for chunks within article sections
      operationId: searchIntelChunks
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: article_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChunkSearchRequest"
      responses:
        "200":
          description: Chunk search response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChunkSearchResponse"
  /v2/research/context/pack:
    post:
      summary: Retrieve a context pack from research documents
      operationId: researchContextPack
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResearchContextPackRequest"
      responses:
        "200":
          description: Research context pack response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchContextPackResponse"
  /v2/research/documents/{document_id}/chunks:search:
    post:
      summary: Search chunks within a research document
      operationId: searchResearchDocumentChunks
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: document_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResearchChunkSearchRequest"
      responses:
        "200":
          description: Research chunk search response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchChunkSearchResponse"
  /v2/research/sources/bootstrap:
    post:
      summary: Bootstrap source suggestions for a topic and optionally trigger ingestion
      operationId: bootstrapResearchSources
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResearchBootstrapRequest"
      responses:
        "200":
          description: Research source bootstrap response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchBootstrapResponse"
  /v2/research/bootstrap/status:
    get:
      summary: Get latest bootstrap event status for a topic
      operationId: getResearchBootstrapStatus
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: topic_key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Research bootstrap status response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchBootstrapStatusResponse"
  /v2/research/ops/summary:
    get:
      summary: Get research pipeline ops summary for a topic
      operationId: getResearchOpsSummary
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: topic_key
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Research ops summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchOpsSummaryResponse"
  /v2/research/ops/sources:
    get:
      summary: Get per-source research pipeline metrics for a topic
      operationId: getResearchSourceMetrics
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: topic_key
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Research source metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResearchSourceMetricsResponse"
