name: Publish Lambic AI Brief

on:
  workflow_dispatch:
    inputs:
      date:
        description: Optional UTC publication date (YYYY-MM-DD)
        required: false
        type: string
      dry_run:
        description: Run generation and validation without writing or pushing
        required: false
        default: true
        type: boolean
      force:
        description: Force generation even if the date would normally be skipped
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "30 6 * * *"

concurrency:
  group: publish-lambic-ai-brief
  cancel-in-progress: false

jobs:
  publish:
    runs-on:
      - self-hosted
      - Windows
      - X64
      - context-api
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Create Python virtualenv
        shell: pwsh
        run: |
          $python = 'C:\Users\Matth\AppData\Local\Programs\Python\Python312\python.exe'
          if (-not (Test-Path $python)) {
            throw "Expected Python 3.12 at $python"
          }
          & $python -m venv .venv
          & .\.venv\Scripts\python.exe -m pip install --upgrade pip
          & .\.venv\Scripts\python.exe -m pip install -r requirements.txt

      - name: Prepare report output
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path artifacts | Out-Null

      - name: Prepare website publish worktree
        shell: pwsh
        env:
          BRIEF_WEBSITE_REPO_BASE: ${{ vars.BRIEF_WEBSITE_REPO }}
        run: |
          $baseRepo = $env:BRIEF_WEBSITE_REPO_BASE
          if (-not $baseRepo) {
            throw "Repository variable BRIEF_WEBSITE_REPO is not configured"
          }
          if (-not (Test-Path (Join-Path $baseRepo '.git'))) {
            throw "Website repo is not a git repository: $baseRepo"
          }

          git config --global --add safe.directory $baseRepo
          git -C $baseRepo fetch origin main --prune

          $publishRepo = Join-Path $env:RUNNER_TEMP ("lambic-labs-website-publish-{0}-{1}" -f $env:GITHUB_RUN_ID, $env:GITHUB_RUN_ATTEMPT)
          if (Test-Path $publishRepo) {
            Remove-Item -LiteralPath $publishRepo -Recurse -Force
          }

          $branchName = "brief-publish/$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT"
          git -C $baseRepo worktree add --force -b $branchName $publishRepo origin/main
          git config --global --add safe.directory $publishRepo

          "BRIEF_WEBSITE_REPO=$publishRepo" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BRIEF_WEBSITE_REPO_BASE=$baseRepo" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "BRIEF_WEBSITE_WORKTREE_BRANCH=$branchName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish Lambic AI Brief
        shell: pwsh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CONTEXT_API_TOKEN: ${{ secrets.CONTEXT_API_TOKEN }}
          BRIEF_PUBLISH_ENV: prod
          BRIEF_PUBLISH_REPORT_DIR: ${{ github.workspace }}/artifacts
          DAILY_DIGEST_GIT_REMOTE: origin
          DAILY_DIGEST_GIT_BRANCH: main
        run: |
          $args = @("scripts/publish_lambic_ai_brief.py", "--mode", "daily")
          if ("${{ inputs.date }}") {
            $args += @("--date", "${{ inputs.date }}")
          }
          if ("${{ inputs.dry_run }}" -eq "true") {
            $args += "--dry-run"
          }
          if ("${{ inputs.force }}" -eq "true") {
            $args += "--force"
          }
          & .\.venv\Scripts\python.exe @args

      - name: Clean up website publish worktree
        if: always()
        shell: pwsh
        run: |
          $baseRepo = $env:BRIEF_WEBSITE_REPO_BASE
          $publishRepo = $env:BRIEF_WEBSITE_REPO
          $branchName = $env:BRIEF_WEBSITE_WORKTREE_BRANCH

          if ($baseRepo -and $publishRepo) {
            git config --global --add safe.directory $baseRepo
            if (Test-Path $publishRepo) {
              git -C $baseRepo worktree remove --force $publishRepo
            }
          }

          if ($baseRepo -and $branchName) {
            $existingBranch = git -C $baseRepo branch --list $branchName
            if ($LASTEXITCODE -eq 0 -and $existingBranch) {
              git -C $baseRepo branch -D $branchName
            }
          }

      - name: Upload publish report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lambic-ai-brief-publish-report
          path: artifacts/*.json
          if-no-files-found: ignore
