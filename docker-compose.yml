services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: context
      POSTGRES_USER: context
      POSTGRES_PASSWORD: context
    ports:
    - 5433:5432
    volumes:
    - ${CONTEXT_POSTGRES_DATA_DIR:-C:/BrainOSData/context_postgres}:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U context -d context
      interval: 3s
      timeout: 3s
      retries: 30
  migrate:
    build: .
    env_file:
    - .env
    environment:
      DATABASE_URL: postgresql+psycopg://context:context@postgres:5432/context
    depends_on:
      postgres:
        condition: service_healthy
    command:
    - alembic
    - upgrade
    - head
  api:
    build: .
    env_file:
    - .env
    environment:
      DATABASE_URL: postgresql+psycopg://context:context@postgres:5432/context
      CONTEXT_API_TOKEN: ${CONTEXT_API_TOKEN:-change-me}
      CONTEXT_API_RESEARCH_TOPIC_KEY: ${CONTEXT_API_RESEARCH_TOPIC_KEY:-ai_research}
      CONTEXT_POSTGRES_DATA_DIR: ${CONTEXT_POSTGRES_DATA_DIR:-C:/BrainOSData/context_postgres}
      EDGE_PROXY_ENABLED: ${EDGE_PROXY_ENABLED:-false}
      CONTEXT_API_EXPECT_PERSISTENT_CORPUS: ${CONTEXT_API_EXPECT_PERSISTENT_CORPUS:-true}
      CONTEXT_API_EXPECTED_MIN_DOCUMENTS: ${CONTEXT_API_EXPECTED_MIN_DOCUMENTS:-100}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEARCH_EMBEDDING_MODEL: ${RESEARCH_EMBEDDING_MODEL:-text-embedding-3-small}
      RESEARCH_ALLOW_HASH_EMBEDDINGS: ${RESEARCH_ALLOW_HASH_EMBEDDINGS:-false}
      VERSION: 0.0.0
      GIT_SHA: unknown
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
    - uvicorn
    - app.main:app
    - --host
    - 0.0.0.0
    - --port
    - '8001'
  research_worker:
    build: .
    env_file:
    - .env
    environment:
      DATABASE_URL: postgresql+psycopg://context:context@postgres:5432/context
      CONTEXT_API_TOKEN: ${CONTEXT_API_TOKEN:-change-me}
      CONTEXT_API_RESEARCH_TOPIC_KEY: ${CONTEXT_API_RESEARCH_TOPIC_KEY:-ai_research}
      CONTEXT_POSTGRES_DATA_DIR: ${CONTEXT_POSTGRES_DATA_DIR:-C:/BrainOSData/context_postgres}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEARCH_EMBEDDING_MODEL: ${RESEARCH_EMBEDDING_MODEL:-text-embedding-3-small}
      RESEARCH_ALLOW_HASH_EMBEDDINGS: ${RESEARCH_ALLOW_HASH_EMBEDDINGS:-false}
      RESEARCH_WORKER_ENABLED: ${RESEARCH_WORKER_ENABLED:-true}
      RESEARCH_SOURCE_FAILURE_THRESHOLD: ${RESEARCH_SOURCE_FAILURE_THRESHOLD:-3}
      RESEARCH_SOURCE_COOLDOWN_MINUTES: ${RESEARCH_SOURCE_COOLDOWN_MINUTES:-60}
      RESEARCH_RUN_MAX_NEW_ITEMS: ${RESEARCH_RUN_MAX_NEW_ITEMS:-0}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command:
    - python
    - -m
    - app.research.worker
    - --sleep-seconds
    - '10'
