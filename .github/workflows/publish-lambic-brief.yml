name: Publish Lambic AI Brief

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Publish mode to run
        required: false
        default: daily
        type: choice
        options:
          - daily
          - backfill-missing
          - backfill-range
      date:
        description: Optional UTC publication date (YYYY-MM-DD)
        required: false
        type: string
      start_date:
        description: Optional start date for backfill modes (YYYY-MM-DD)
        required: false
        type: string
      end_date:
        description: Optional end date for backfill modes (YYYY-MM-DD)
        required: false
        type: string
      dry_run:
        description: Run generation and validation without writing or pushing
        required: false
        default: true
        type: boolean
      force:
        description: Force generation even if the date would normally be skipped
        required: false
        default: false
        type: boolean

concurrency:
  group: publish-lambic-ai-brief
  cancel-in-progress: false

jobs:
  publish:
    runs-on:
      - self-hosted
      - Linux
      - X64
      - lambic-local-1
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Prepare report output
        shell: bash
        run: |
          mkdir -p artifacts

      - name: Publish Lambic AI Brief
        shell: bash
        env:
          BRIEF_PUBLISH_REPORT_DIR: ${{ github.workspace }}/artifacts
          INPUT_MODE: ${{ github.event.inputs.mode || 'daily' }}
          INPUT_DATE: ${{ github.event.inputs.date || '' }}
          INPUT_START_DATE: ${{ github.event.inputs.start_date || '' }}
          INPUT_END_DATE: ${{ github.event.inputs.end_date || '' }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run || 'true' }}
          INPUT_FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            ./scripts/run_lambic_brief_publish_daily.sh
            exit 0
          fi

          args=(--mode "${INPUT_MODE}")
          if [[ -n "${INPUT_DATE}" ]]; then
            args+=(--date "${INPUT_DATE}")
          fi
          if [[ -n "${INPUT_START_DATE}" ]]; then
            args+=(--start-date "${INPUT_START_DATE}")
          fi
          if [[ -n "${INPUT_END_DATE}" ]]; then
            args+=(--end-date "${INPUT_END_DATE}")
          fi
          if [[ "${INPUT_DRY_RUN}" == "true" ]]; then
            args+=(--dry-run)
          fi
          if [[ "${INPUT_FORCE}" == "true" ]]; then
            args+=(--force)
          fi
          ./scripts/run_lambic_brief_publish.sh "${args[@]}"

      - name: Upload publish report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lambic-ai-brief-publish-report
          path: artifacts/*.json
          if-no-files-found: ignore
